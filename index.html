<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Link Player</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #121212; color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .container { background: #1e1e1e; padding: 25px 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); text-align: center; width: 100%; max-width: 650px; border: 1px solid #333; }
        h1 { color: #ffffff; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex-grow: 1; padding: 12px 15px; border: 1px solid #444; border-radius: 8px; font-size: 16px; background-color: #2b2b2b; color: #e0e0e0; outline: none; transition: border-color 0.3s; }
        input[type="text"]:focus { border-color: #007bff; }
        button { padding: 12px 25px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 600; transition: background-color 0.3s, transform 0.2s; }
        button:hover:not(:disabled) { background-color: #0056b3; transform: translateY(-2px); }
        button:disabled { background-color: #555; cursor: not-allowed; }
        #video-container { margin-top: 25px; min-height: 300px; background-color: #000; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; max-height: 500px; border-radius: 8px; outline: none; }
        #message { margin-top: 15px; font-weight: bold; min-height: 24px; }
        .loader { border: 4px solid #f3f3f3; border-radius: 50%; border-top: 4px solid #007bff; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Terabox Video Player</h1>
        <div class="input-group">
            <input type="text" id="video-url" placeholder="Paste Terabox video link here...">
            <button id="play-btn" onclick="playVideo()">Play</button>
        </div>
        <div id="message"></div>
        <div id="video-container"></div>
    </div>
    <script>
        const urlInput = document.getElementById('video-url');
        const playBtn = document.getElementById('play-btn');
        const messageDiv = document.getElementById('message');
        const videoContainer = document.getElementById('video-container');

        async function playVideo() {
            const teraboxUrl = urlInput.value.trim();
            if (!teraboxUrl) { showMessage('Please enter a URL.', 'red'); return; }
            playBtn.disabled = true; playBtn.textContent = 'Loading...';
            videoContainer.innerHTML = '<div class="loader"></div>'; showMessage('', 'blue');
            try {
                const response = await fetch('/api/get-video-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: teraboxUrl })
                });
                const data = await response.json();
                if (!response.ok) { throw new Error(data.error || 'Server error'); }
                showMessage('Video loaded! Enjoy.', 'green');
                videoContainer.innerHTML = `<video controls autoplay src="${data.videoUrl}"></video>`;
            } catch (error) {
                console.error('Fetch Error:', error);
                showMessage(`Error: ${error.message}`, 'red');
                videoContainer.innerHTML = '';
            } finally {
                playBtn.disabled = false; playBtn.textContent = 'Play';
            }
        }
        function showMessage(msg, color) { messageDiv.textContent = msg; messageDiv.style.color = color; }
    </script>
</body>
</html>
